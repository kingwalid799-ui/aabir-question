<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Question Page</title>
  <style>
    :root {
      --bg-1: #fff7f8;
      --bg-2: #ffe5eb;
      --card: rgba(255, 255, 255, 0.82);
      --text: #7a3148;
      --muted: #9a6273;
      --primary: #ff5f8f;
      --primary-dark: #e44779;
      --secondary: #ffd3df;
      --danger-soft: #f6b8c8;
      --cream: #fff0e6;
      --shadow: 0 18px 50px rgba(197, 89, 125, 0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --scale-step: 0;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffeef3 0%, transparent 32%),
        radial-gradient(circle at bottom right, #ffd7e3 0%, transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hearts-layer,
    .sparkles-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px;
      font-size: clamp(18px, 2.2vw, 28px);
      opacity: 0.2;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 8px 10px rgba(255, 95, 143, 0.18));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(0.85);
        opacity: 0;
      }
      15% {
        opacity: 0.28;
      }
      80% {
        opacity: 0.22;
      }
      100% {
        transform: translateY(-115vh) translateX(28px) scale(1.15);
        opacity: 0;
      }
    }

    .scene {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
    }

    .question-card {
      position: relative;
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px 20px 24px;
      overflow: hidden;
      isolation: isolate;
    }

    .question-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.7), transparent 45%);
      z-index: -1;
    }

    .badge {
      width: max-content;
      margin: 0 auto 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 25px rgba(210, 115, 145, 0.12);
    }

    .bears-wrap {
      display: flex;
      justify-content: center;
      align-items: end;
      gap: 18px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .bear {
      position: relative;
      width: clamp(96px, 22vw, 132px);
      aspect-ratio: 1 / 1.08;
      display: grid;
      place-items: center;
      transition: transform 300ms ease, filter 300ms ease;
    }

    .bear-body {
      position: absolute;
      inset: 18% 16% 6%;
      background: linear-gradient(180deg, #e6b89b, #d69b7b);
      border-radius: 44% 44% 38% 38%;
      box-shadow: inset 0 -6px 0 rgba(110, 56, 37, 0.08);
    }

    .bear-head {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: 62%;
      height: 48%;
      background: linear-gradient(180deg, #e8bd9f, #d9a282);
      border-radius: 50%;
    }

    .ear,
    .inner-ear,
    .eye,
    .nose,
    .mouth,
    .paw,
    .foot,
    .belly,
    .heart-sign,
    .bear-reaction {
      position: absolute;
    }

    .ear {
      width: 22%;
      height: 22%;
      top: 1%;
      background: #d9a282;
      border-radius: 50%;
    }

    .ear.left { left: 18%; }
    .ear.right { right: 18%; }

    .inner-ear {
      inset: 24%;
      background: #efc1b6;
      border-radius: 50%;
    }

    .eye {
      width: 6.5%;
      height: 6.5%;
      background: #503130;
      border-radius: 50%;
      top: 25%;
    }

    .eye.left { left: 39%; }
    .eye.right { right: 39%; }

    .nose {
      width: 13%;
      height: 10%;
      background: #503130;
      border-radius: 48% 48% 62% 62%;
      top: 31%;
      left: 50%;
      transform: translateX(-50%);
    }

    .mouth {
      width: 18%;
      height: 10%;
      border-bottom: 3px solid #6a4342;
      border-radius: 0 0 50px 50px;
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
    }

    .belly {
      width: 30%;
      height: 24%;
      background: #f0cfbf;
      border-radius: 50%;
      bottom: 16%;
      left: 50%;
      transform: translateX(-50%);
    }

    .paw {
      width: 18%;
      height: 14%;
      background: #d89d7d;
      border-radius: 50%;
      top: 52%;
    }

    .paw.left { left: 19%; transform: rotate(20deg); }
    .paw.right { right: 19%; transform: rotate(-20deg); }

    .foot {
      width: 18%;
      height: 12%;
      background: #d89d7d;
      border-radius: 50%;
      bottom: 4%;
    }

    .foot.left { left: 24%; }
    .foot.right { right: 24%; }

    .heart-sign {
      top: 49%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-6deg);
      width: 36%;
      height: 28%;
      display: grid;
      place-items: center;
      font-size: clamp(24px, 5vw, 34px);
      background: linear-gradient(180deg, #ff8fb0, #ff6f9b);
      color: white;
      border-radius: 22px;
      box-shadow: 0 12px 20px rgba(255, 92, 143, 0.22);
    }

    .bear-reaction {
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(20px, 3vw, 28px);
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .bear.happy {
      animation: bounceBear 0.75s ease;
      filter: drop-shadow(0 18px 26px rgba(255, 95, 143, 0.22));
    }

    .bear.happy .bear-reaction,
    .bear.confused .bear-reaction {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    .bear.confused {
      animation: wobbleBear 0.5s ease;
      filter: saturate(0.96);
    }

    .bear.confused .heart-sign {
      background: linear-gradient(180deg, #f7c6d4, #ef9fba);
    }

    @keyframes bounceBear {
      0%, 100% { transform: translateY(0); }
      35% { transform: translateY(-8px); }
      60% { transform: translateY(2px); }
    }

    @keyframes wobbleBear {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
      75% { transform: rotate(-3deg); }
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 520px;
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.96rem, 2vw, 1.05rem);
      line-height: 1.55;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 26px;
    }

    .btn {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease, filter 180ms ease;
      min-height: 58px;
      box-shadow: 0 12px 24px rgba(197, 89, 125, 0.14);
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-yes {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: white;
      transform: scale(calc(1 + var(--scale-step)));
      box-shadow: 0 16px 32px rgba(228, 71, 121, 0.28);
    }

    .btn-yes.pulse {
      animation: yesPulse 1.05s ease-in-out infinite;
    }

    .btn-yes:hover {
      filter: brightness(1.03);
    }

    .btn-no {
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      border: 1px solid rgba(240, 168, 191, 0.7);
    }

    .btn-no.low-emphasis {
      opacity: 0.82;
      transform: scale(0.98);
    }

    .btn-no.shake {
      animation: shake 0.38s ease;
    }

    @keyframes yesPulse {
      0%, 100% {
        box-shadow: 0 16px 32px rgba(228, 71, 121, 0.28), 0 0 0 0 rgba(255, 95, 143, 0.18);
      }
      50% {
        box-shadow: 0 16px 32px rgba(228, 71, 121, 0.34), 0 0 0 12px rgba(255, 95, 143, 0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .result {
      margin-top: 22px;
      border-radius: 22px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,243,247,0.9));
      border: 1px solid rgba(255, 201, 216, 0.85);
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 1.12rem;
      font-weight: 800;
    }

    .result-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .reset-btn {
      border: none;
      background: #fff;
      color: var(--text);
      font-weight: 800;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(197, 89, 125, 0.14);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(197, 89, 125, 0.18);
    }

    .tiny-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      opacity: 0.8;
    }

    .sparkle {
      position: absolute;
      font-size: 22px;
      animation: sparklePop 900ms ease forwards;
      pointer-events: none;
    }

    @keyframes sparklePop {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.6);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-54px) scale(1.28);
      }
    }

    @media (min-width: 640px) {
      .question-card {
        padding: 34px 32px 28px;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>
  <div class="sparkles-layer" id="sparklesLayer" aria-hidden="true"></div>

  <main class="scene">
    <section class="question-card" id="card">
      <div class="badge">Cute question mode 💘</div>

      <div class="bears-wrap" aria-hidden="true">
        <div class="bear" id="bearLeft">
          <div class="bear-head"></div>
          <div class="ear left"><div class="inner-ear"></div></div>
          <div class="ear right"><div class="inner-ear"></div></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
          <div class="bear-body"></div>
          <div class="belly"></div>
          <div class="paw left"></div>
          <div class="paw right"></div>
          <div class="foot left"></div>
          <div class="foot right"></div>
          <div class="heart-sign">💖</div>
          <div class="bear-reaction" id="bearReactionLeft">✨</div>
        </div>

        <div class="bear" id="bearRight">
          <div class="bear-head"></div>
          <div class="ear left"><div class="inner-ear"></div></div>
          <div class="ear right"><div class="inner-ear"></div></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
          <div class="bear-body"></div>
          <div class="belly"></div>
          <div class="paw left"></div>
          <div class="paw right"></div>
          <div class="foot left"></div>
          <div class="foot right"></div>
          <div class="heart-sign">❤️</div>
          <div class="bear-reaction" id="bearReactionRight">💕</div>
        </div>
      </div>

      <h1 class="title" id="questionText"></h1>
      <p class="subtitle" id="subtitleText">Choose one answer below 💗</p>

      <div class="buttons">
        <button class="btn btn-yes" id="yesBtn" type="button"></button>
        <button class="btn btn-no" id="noBtn" type="button"></button>
      </div>

      <div class="result" id="resultBox" aria-live="polite">
        <p class="result-title">Awwww 🫶</p>
        <p class="result-message" id="resultMessage"></p>
      </div>

      <div class="controls">
        <button class="reset-btn" id="resetBtn" type="button">Reset</button>
      </div>

      <p class="tiny-note">All editable text is grouped inside the JavaScript config section.</p>
    </section>
  </main>

  <script>
    /* =========================================================
       EDITABLE CONTENT SECTION
       Change all text here only.
    ========================================================= */
    const CONFIG = {
      QUESTION: "Aabir wach ana 3ziz 3likk wla la??",
      OPTION_1_TEXT: "Yes bzfff",
      OPTION_2_TEXT: "Laaa chkon kdeb 3lik",
      SUCCESS_MESSAGE: "Iwa sf alhbila matb9ayx m9l9a mni rah wlh maghwet 3likk🫶🫶",
      FALLBACK_LAST_REASK: "Yaaaak? xofi okann wa9ila wrekti blghalatt",
      REASK_QUESTIONS: [
        "Are you sure? 👀",
        "yawde fkrii mznnn",
        "Last chance 😌",
        "Anaa ma3zizxx 3likkk??  🥺"
      ],
      LOOP_REASKS: false,
      YES_SCALE_STEP: 0.07,
      YES_SCALE_MAX: 1.42,
      HEART_EMOJIS: ["💖", "💕", "💘", "💗", "💞", "❤️"],
      HAPPY_REACTIONS: ["✨", "💞", "🎉", "💖"],
      CONFUSED_REACTIONS: ["🥺", "😵", "❓", "🙈"]
    };

    const questionText = document.getElementById("questionText");
    const subtitleText = document.getElementById("subtitleText");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const resultBox = document.getElementById("resultBox");
    const resultMessage = document.getElementById("resultMessage");
    const resetBtn = document.getElementById("resetBtn");
    const heartsLayer = document.getElementById("heartsLayer");
    const sparklesLayer = document.getElementById("sparklesLayer");
    const bearLeft = document.getElementById("bearLeft");
    const bearRight = document.getElementById("bearRight");
    const bearReactionLeft = document.getElementById("bearReactionLeft");
    const bearReactionRight = document.getElementById("bearReactionRight");

    let reaskIndex = 0;
    let yesScale = 1;
    let accepted = false;

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function setQuestion(text) {
      questionText.textContent = text;
    }

    function applyYesScale() {
      document.documentElement.style.setProperty("--scale-step", String(Math.max(0, yesScale - 1)));
    }

    function animateReaction(type) {
      bearLeft.classList.remove("happy", "confused");
      bearRight.classList.remove("happy", "confused");

      void bearLeft.offsetWidth;
      void bearRight.offsetWidth;

      if (type === "happy") {
        bearReactionLeft.textContent = randomFrom(CONFIG.HAPPY_REACTIONS);
        bearReactionRight.textContent = randomFrom(CONFIG.HAPPY_REACTIONS);
        bearLeft.classList.add("happy");
        bearRight.classList.add("happy");
      } else {
        bearReactionLeft.textContent = randomFrom(CONFIG.CONFUSED_REACTIONS);
        bearReactionRight.textContent = randomFrom(CONFIG.CONFUSED_REACTIONS);
        bearLeft.classList.add("confused");
        bearRight.classList.add("confused");
      }
    }

    function spawnBackgroundHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.textContent = randomFrom(CONFIG.HEART_EMOJIS);
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.animationDuration = `${8 + Math.random() * 7}s`;
      heart.style.animationDelay = `${Math.random() * 1.5}s`;
      heart.style.opacity = String(0.12 + Math.random() * 0.22);
      heartsLayer.appendChild(heart);

      setTimeout(() => heart.remove(), 16000);
    }

    function spawnSparkles(count = 12) {
      const rect = document.getElementById("card").getBoundingClientRect();

      for (let i = 0; i < count; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.textContent = i % 2 === 0 ? "✨" : randomFrom(CONFIG.HEART_EMOJIS);
        sparkle.style.left = `${rect.left + Math.random() * rect.width}px`;
        sparkle.style.top = `${rect.top + 40 + Math.random() * (rect.height * 0.55)}px`;
        sparklesLayer.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 950);
      }
    }

    function getNextReaskQuestion() {
      const list = Array.isArray(CONFIG.REASK_QUESTIONS) ? CONFIG.REASK_QUESTIONS.filter(Boolean) : [];

      if (list.length === 0) {
        return CONFIG.FALLBACK_LAST_REASK;
      }

      if (reaskIndex < list.length) {
        return list[reaskIndex++];
      }

      if (CONFIG.LOOP_REASKS) {
        reaskIndex = 1;
        return list[0];
      }

      return list[list.length - 1] || CONFIG.FALLBACK_LAST_REASK;
    }

    function handlePreferredChoice() {
      if (accepted) return;
      accepted = true;
      setQuestion(CONFIG.QUESTION);
      subtitleText.textContent = "Accepted answer unlocked 💘";
      resultMessage.textContent = CONFIG.SUCCESS_MESSAGE;
      resultBox.classList.add("show");
      yesBtn.disabled = true;
      noBtn.disabled = true;
      yesBtn.classList.remove("pulse");
      noBtn.classList.remove("low-emphasis", "shake");
      animateReaction("happy");
      spawnSparkles(16);
      for (let i = 0; i < 10; i++) {
        setTimeout(spawnBackgroundHeart, i * 120);
      }
    }

    function handleNonPreferredChoice() {
      if (accepted) return;

      const nextQuestion = getNextReaskQuestion();
      setQuestion(nextQuestion);
      subtitleText.textContent = "Hmm... try that again 😌";
      resultBox.classList.remove("show");

      yesScale = Math.min(CONFIG.YES_SCALE_MAX, yesScale + CONFIG.YES_SCALE_STEP);
      applyYesScale();
      yesBtn.classList.add("pulse");

      noBtn.classList.remove("shake");
      void noBtn.offsetWidth;
      noBtn.classList.add("shake", "low-emphasis");

      animateReaction("confused");
      spawnSparkles(5);
    }

    function resetExperience() {
      reaskIndex = 0;
      yesScale = 1;
      accepted = false;
      applyYesScale();
      setQuestion(CONFIG.QUESTION);
      subtitleText.textContent = "Choose one answer below 💗";
      resultMessage.textContent = CONFIG.SUCCESS_MESSAGE;
      resultBox.classList.remove("show");
      yesBtn.disabled = false;
      noBtn.disabled = false;
      yesBtn.classList.remove("pulse");
      noBtn.classList.remove("low-emphasis", "shake");
      bearLeft.classList.remove("happy", "confused");
      bearRight.classList.remove("happy", "confused");
    }

    function init() {
      setQuestion(CONFIG.QUESTION);
      yesBtn.textContent = CONFIG.OPTION_1_TEXT;
      noBtn.textContent = CONFIG.OPTION_2_TEXT;
      resultMessage.textContent = CONFIG.SUCCESS_MESSAGE;
      applyYesScale();

      yesBtn.addEventListener("click", handlePreferredChoice);
      noBtn.addEventListener("click", handleNonPreferredChoice);
      resetBtn.addEventListener("click", resetExperience);

      for (let i = 0; i < 18; i++) {
        setTimeout(spawnBackgroundHeart, i * 450);
      }

      setInterval(spawnBackgroundHeart, 1300);
    }

    init();
  </script>
</body>
</html>
